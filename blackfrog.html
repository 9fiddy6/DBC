    <style>
        :root {
            --bg-dark: #24467f;
            --bg-card: #2d579e;
            --gold-primary: #f3c92e;
            --gold-light: #f3c92e;
            --burgundy: #ffffff;
            --text-light: #F0F0F0;
            --text-muted: #A0A0A0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-light);
        }

        .card-container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 420px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(200, 169, 126, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .brand-header {
            text-align: center;
            padding: 1px 20px 1px;
            position: relative;
            border-bottom: 1px solid rgba(200, 169, 126, 0.2);
        }

        .brand-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top, rgba(200, 169, 126, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo-b {
            width: 300px;
            height: 150px;
            background-color: transparent;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-b img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        .photo-container {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            margin: 20px auto 30px auto;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-section {
            padding: 1px 30px 30px 30px;
            text-align: center;
        }

        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 8px;
            text-transform: capitalize;
        }

        .profile-title {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--gold-primary);
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .contact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 18px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-light);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .contact-item:hover {
            background: rgba(200, 169, 126, 0.1);
            border-color: rgba(200, 169, 126, 0.3);
            transform: translateY(-2px);
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            border-radius: 20%;
            background: rgba(200, 169, 126, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            flex-shrink: 0;
            color: var(--gold-primary);
        }

        .contact-icon svg {
            width: 30px;
            height: 30px;
            fill: currentColor;
        }

        .contact-text-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .contact-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 3px;
        }

        .contact-value {
            font-size: 15px;
            font-weight: 500;
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        .btn-save {
            display: block;
            width: 100%;
            padding: 18px;
            background: rgba(243, 201, 46, 1);
            color: #111;
            text-align: center;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>

    <script>
        async function downloadVCard() {
            const name = "Black Frog";
            const imageUrl = "blackfrog.jpg"; 
            let base64Image = "";
            
            // Try to fetch the image and convert it to Base64 for the vCard
            try {
                const response = await fetch(imageUrl);
                if (response.ok) {
                    const blob = await response.blob();
                    base64Image = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(blob);
                    });
                }
            } catch (e) {
                console.warn("Profile image could not be loaded into vCard. Downloading without photo.");
            }

            const vCardData = `BEGIN:VCARD
VERSION:3.0
N:;${name};;;
FN:${name}
TEL;TYPE=CELL,VOICE:+962793588835
URL;TYPE=Instagram:https://www.instagram.com/blackfrogjo/
URL;TYPE=Whatsapp:https://wa.me/+962793588835
URL;TYPE=Contact:https://fiddy.github.io/DBC/blackfrog.html
${base64Image ? `PHOTO;TYPE=JPEG;ENCODING=b:${base64Image}` : ""}
END:VCARD`;

            const vcfBlob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
            const url = window.URL.createObjectURL(vcfBlob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', `${name}.vcf`);
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
        }
    </script>
